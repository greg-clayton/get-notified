<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notifications</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh;font-size:14px}

/* ── Header ── */
.fn-header{background:white;border-bottom:1px solid #e2e8f0;padding:18px 32px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:100}
.fn-header-left h1{font-size:22px;font-weight:700;color:#0f172a}
.fn-header-left p{font-size:13px;color:#64748b;margin-top:3px}
.fn-header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.fn-search-wrap{position:relative;flex:1;min-width:140px;max-width:260px}
.fn-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none}
.fn-search{padding:8px 12px 8px 34px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;width:100%;outline:none;font-family:inherit}
.fn-search:focus{border-color:#93c5fd}
.fn-open-out{background:none;border:1px solid #e2e8f0;border-radius:8px;padding:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#64748b}
.fn-open-out:hover{background:#f8fafc;color:#0f172a}

/* ── Content ── */
.fn-content{padding:24px 32px;max-width:960px;margin:0}
body{overflow-x:hidden}

/* ── Toolbar ── */
.fn-toolbar{background:white;border:1px solid #e2e8f0;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.fn-filter-group{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.fn-sort-select,.fn-date-input{border:1px solid #e2e8f0;border-radius:8px;padding:7px 10px;font-size:13px;background:white;color:#0f172a;outline:none;font-family:inherit;cursor:pointer}
.fn-reset-btn{background:none;border:none;color:#3b82f6;font-size:13px;font-weight:600;padding:4px 8px;cursor:pointer;font-family:inherit;white-space:nowrap}
.fn-reset-btn:hover{text-decoration:underline}
/* ── Filter Dropdown (matches management screen) ── */
.filter-dropdown-wrap{position:relative}
.filter-dropdown-btn{background:white;border:1px solid #e2e8f0;border-radius:8px;padding:7px 12px;font-size:13px;color:#0f172a;display:flex;align-items:center;gap:8px;white-space:nowrap;min-width:110px;justify-content:space-between;cursor:pointer;font-family:inherit}
.filter-dropdown-btn:hover{border-color:#cbd5e1;background:#f8fafc}
.filter-dropdown-menu{position:absolute;top:calc(100% + 4px);right:0;background:white;border:1px solid #e2e8f0;border-radius:10px;padding:6px 0;z-index:200;min-width:170px;box-shadow:0 8px 24px rgba(0,0,0,0.1)}
.filter-dropdown-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:#0f172a;user-select:none}
.filter-dropdown-item:hover{background:#f8fafc}
.filter-checkbox{width:16px;height:16px;accent-color:#3b82f6;cursor:pointer;flex-shrink:0}

/* ── Section ── */
.fn-section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.fn-section-title{font-size:14px;font-weight:700;color:#0f172a;display:flex;align-items:center;gap:8px}
.fn-count{background:#e2e8f0;border-radius:99px;padding:2px 9px;font-size:12px;font-weight:600;color:#475569}
.fn-mark-read{background:none;border:none;color:#3b82f6;font-size:13px;font-weight:600;cursor:pointer;padding:0}
.fn-mark-read:hover{text-decoration:underline}

/* ── Notification Item ── */
.fn-item{background:white;border:1px solid #e2e8f0;border-radius:10px;padding:16px 18px;margin-bottom:10px;display:flex;gap:14px;cursor:pointer;transition:box-shadow 0.15s}
.fn-item:hover{box-shadow:0 2px 12px rgba(0,0,0,0.07)}
.fn-item-icon{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.fn-item-body{flex:1;min-width:0}
.fn-item-row1{display:flex;align-items:flex-start;gap:8px}
.fn-item-title{font-size:14px;font-weight:700;color:#0f172a;flex:1;line-height:1.35}
.fn-item-expand{background:none;border:none;color:#94a3b8;cursor:pointer;padding:3px;flex-shrink:0;display:flex;align-items:center}
.fn-item-expand:hover{color:#64748b}
.fn-item-msg{font-size:13px;color:#475569;margin-top:6px;line-height:1.6;overflow-wrap:break-word;word-break:break-word;overflow:hidden}
.fn-item-msg.clamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis}
.fn-item-expand svg,.fn-item-expand path{pointer-events:none}
.fn-item-footer{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.fn-item-time{font-size:12px;color:#94a3b8;margin-left:auto;display:flex;align-items:center;gap:6px;white-space:nowrap}
.fn-dot{width:8px;height:8px;border-radius:50%;background:#10b981;flex-shrink:0;box-shadow:0 0 6px rgba(16,185,129,0.5)}
.fn-link-btn{display:inline-flex;align-items:center;color:#3b82f6;padding:2px 3px;border-radius:3px;text-decoration:none;flex-shrink:0;transition:color 0.15s,background 0.15s}
.fn-link-btn:hover{color:#2563eb;background:#eff6ff}

/* ── Severity Pills ── */
.sev-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.sev-critical{background:#fee2e2;color:#dc2626}
.sev-warning {background:#fef9c3;color:#a16207}
.sev-info    {background:#dbeafe;color:#1d4ed8}

/* ── Show older ── */
.fn-show-older{width:100%;background:white;border:1px solid #e2e8f0;border-radius:10px;padding:14px;text-align:center;color:#64748b;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit}
.fn-show-older:hover{background:#f8fafc}

/* ── Empty ── */
.fn-empty{text-align:center;padding:52px;color:#94a3b8;font-size:14px}
.fn-loading{text-align:center;padding:40px;color:#94a3b8;font-size:14px}

/* ── Pagination ── */
.fn-pagination{display:flex;align-items:center;justify-content:flex-start;gap:16px;padding:16px 0 4px;flex-wrap:wrap}
.fn-pg-left{display:flex;align-items:center;gap:8px}
.fn-pg-right{display:flex;align-items:center;gap:6px}
.fn-pg-label{font-size:13px;color:#64748b;white-space:nowrap}
.fn-pg-select{border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;font-size:13px;background:white;color:#0f172a;outline:none;cursor:pointer;font-family:inherit}
.fn-pg-select:focus{border-color:#93c5fd}
.fn-pg-info{font-size:13px;color:#64748b;white-space:nowrap;margin-right:2px}
.fn-pg-btn{background:white;border:1px solid #e2e8f0;border-radius:6px;padding:5px 10px;font-size:14px;color:#334155;cursor:pointer;line-height:1;font-family:inherit;transition:background 0.1s}
.fn-pg-btn:hover:not(:disabled){background:#f1f5f9;border-color:#cbd5e1}
.fn-pg-btn:disabled{color:#cbd5e1;cursor:default;border-color:#f1f5f9;background:white}
.fn-pg-current{font-size:13px;font-weight:600;color:#0f172a;padding:5px 10px;border:1px solid #3b82f6;border-radius:6px;background:#eff6ff;min-width:32px;text-align:center;line-height:1}

/* ── Pin button ── */
.fn-pin-btn{background:none;border:none;color:#94a3b8;cursor:pointer;padding:3px 4px;flex-shrink:0;display:flex;align-items:center;border-radius:5px;transition:color 0.15s,background 0.15s}
.fn-pin-btn:hover{color:#f59e0b;background:#fef3c7}
.fn-pin-btn.pinned{color:#f59e0b}

/* ── View Tabs (All / Pinned) ── */
.fn-view-tabs{display:flex;align-items:center;border-bottom:2px solid #e2e8f0;margin-bottom:16px}
.fn-view-tab{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;padding:9px 18px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;font-family:inherit;transition:color 0.15s,border-color 0.15s}
.fn-view-tab.active{color:#3b82f6;border-bottom-color:#3b82f6}
.fn-view-tab:hover:not(.active){color:#334155}
</style>
</head>
<body>

<!-- Header -->
<div class="fn-header">
  <div class="fn-header-left">
    <h1>Notifications</h1>
    <p>Stay informed with real-time shipping notifications from your trusted carriers.</p>
  </div>
</div>

<!-- Content -->
<div class="fn-content">

  <!-- Section Header -->
  <div class="fn-section-hdr">
    <div class="fn-section-title">
      Shipping Notifications
      <span class="fn-count" id="fn-count">0</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="fn-toolbar">
    <div class="fn-search-wrap">
      <div class="fn-search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <input class="fn-search" id="search" type="text" placeholder="Search here...." oninput="applyFilters()"/>
    </div>
    <div class="fn-filter-group">
      <select class="fn-sort-select" id="sort-select" onchange="applyFilters()">
        <option value="newest">Sort By: Newest</option>
        <option value="oldest">Sort By: Oldest</option>
        <option value="severity">Sort By: Severity</option>
      </select>
      <input type="date" class="fn-date-input" id="date-filter" onchange="applyFilters()"/>
      <div class="filter-dropdown-wrap" id="type-dd-wrap">
        <button class="filter-dropdown-btn" onclick="toggleTypeDropdown()">
          <span id="type-dd-label">Type</span>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="filter-dropdown-menu" id="type-dd-menu" style="display:none">
          <div class="filter-dropdown-item" onclick="toggleTypeAll()">
            <input type="checkbox" class="filter-checkbox" id="dd-chk-all" checked/>
            <span>Select All</span>
          </div>
          <div class="filter-dropdown-item" onclick="toggleTypeOption('Carrier')">
            <input type="checkbox" class="filter-checkbox" id="dd-chk-carrier" checked/>
            <span>Carrier</span>
          </div>
          <div class="filter-dropdown-item" onclick="toggleTypeOption('Country')">
            <input type="checkbox" class="filter-checkbox" id="dd-chk-country" checked/>
            <span>Country</span>
          </div>
          <div class="filter-dropdown-item" onclick="toggleTypeOption('General')">
            <input type="checkbox" class="filter-checkbox" id="dd-chk-general" checked/>
            <span>General</span>
          </div>
        </div>
      </div>
      <button class="fn-reset-btn" onclick="resetFilters()">RESET</button>
    </div>
  </div>

  <!-- View Tabs -->
  <div class="fn-view-tabs">
    <button class="fn-view-tab active" id="vtab-all"    onclick="switchViewTab('all')">All</button>
    <button class="fn-view-tab"        id="vtab-pinned" onclick="switchViewTab('pinned')">Pinned</button>
    <button class="fn-mark-read" style="margin-left:auto;padding-bottom:9px" onclick="markAllRead()">Mark all as read</button>
  </div>

  <!-- List -->
  <div id="fn-list"><div class="fn-loading">Loading notifications…</div></div>

  <!-- Show older -->
  <button class="fn-show-older" id="fn-show-older" style="display:none" onclick="showOlder()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
    Show older shipping notifications
  </button>

  <!-- Pagination -->
  <div class="fn-pagination" id="fn-pagination"></div>

</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────
const LS_KEY        = 'gn_read_ids';
const LS_PINNED_KEY = 'gn_pinned_ids';
const RECENT_DAYS = 7;

const TYPE_ICONS = {
  Carrier:{ color:'#f59e0b', bg:'#fff7ed', d:'M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.657 1.343 3 3 3s3-1.343 3-3h6c0 1.657 1.343 3 3 3s3-1.343 3-3h2v-5l-3-4zM6 18.5c-.828 0-1.5-.672-1.5-1.5s.672-1.5 1.5-1.5 1.5.672 1.5 1.5-.672 1.5-1.5 1.5zm13.5-9l1.961 2.5H17V9.5h2.5zm-1 9c-.828 0-1.5-.672-1.5-1.5s.672-1.5 1.5-1.5 1.5.672 1.5 1.5-.672 1.5-1.5 1.5z' },
  Country:{ color:'#8b5cf6', bg:'#f5f3ff', d:'M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-1 17.93c-3.94-.49-7-3.858-7-7.93 0-.62.079-1.222.21-1.8L9 15v1a2 2 0 002 2v1.93zm6.9-2.54A2 2 0 0016 13h-1v-3a1 1 0 00-1-1H8v-2h2a1 1 0 000-2V3.07A8.003 8.003 0 0120 11c0 2.395-1.053 4.543-2.1 5.39z' },
  General:{ color:'#10b981', bg:'#ecfdf5', d:'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' },
};
const SEV_ICONS = {
  Critical:{ color:'#dc2626', bg:'#fee2e2', cls:'sev-critical', d:'M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' },
  Warning :{ color:'#a16207', bg:'#fef9c3', cls:'sev-warning',  d:'M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z' },
  Info    :{ color:'#1d4ed8', bg:'#dbeafe', cls:'sev-info',     d:'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' },
};

// ── State ──────────────────────────────────────────────────────────────
let allNotifs = [];
let visibleCount = 0;
let showingOlder = false;
let viewTab      = 'all';
const expanded = new Set();
let currentPage  = 1;
let rowsPerPage  = 10;

// ── Helpers ────────────────────────────────────────────────────────────
function getReadIds()  { try{ return new Set(JSON.parse(localStorage.getItem(LS_KEY)||'[]'));        }catch{ return new Set(); } }
function saveReadIds(s){ localStorage.setItem(LS_KEY, JSON.stringify([...s])); }
function readKey(n)    { return (n.id||'')+'|'+(n.createdAt||''); }
function getPinnedIds()  { try{ return new Set(JSON.parse(localStorage.getItem(LS_PINNED_KEY)||'[]')); }catch{ return new Set(); } }
function savePinnedIds(s){ localStorage.setItem(LS_PINNED_KEY, JSON.stringify([...s])); }

// ── Cloud read/pin state sync (cross-origin with dashboard) ────────────
async function getCloudState(){
  try{
    const r = await fetch('/api/read-state');
    const j = await r.json();
    return { readIds: new Set(j.readIds || []), pinnedIds: new Set(j.pinnedIds || []) };
  } catch { return { readIds: new Set(), pinnedIds: new Set() }; }
}
function syncToCloud(){
  const rid  = getReadIds();
  const pids = getPinnedIds();
  fetch('/api/read-state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({readIds:[...rid],pinnedIds:[...pids]})}).catch(()=>{});
}

function timeAgo(iso){
  if(!iso) return '';
  const diff = (Date.now() - new Date(iso)) / 1000;
  if(diff < 60) return 'just now';
  if(diff < 3600){ const m=Math.floor(diff/60); return `${m} min${m!==1?'s':''} ago`; }
  if(diff < 86400){ const h=Math.floor(diff/3600); return `${h} hr${h!==1?'s':''} ago`; }
  const d=Math.floor(diff/86400); return `${d} day${d!==1?'s':''} ago`;
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function svgIcon(d, size, color){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${d}"/></svg>`;
}

function chevDown(){ return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>`; }
function chevUp()  { return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>`; }

// ── Pin helpers ────────────────────────────────────────────────────────
function pinIcon(pinned){
  const col  = pinned ? '#f59e0b' : '#94a3b8';
  const fill = pinned ? col : 'none';
  return `<svg width="14" height="14" viewBox="0 0 24 24" fill="${fill}" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h.5a2 2 0 0 0 0-4h-7a2 2 0 0 0 0 4H9v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/><line x1="12" y1="17" x2="12" y2="22"/></svg>`;
}

function switchViewTab(tab){
  viewTab = tab;
  document.getElementById('vtab-all').className    = 'fn-view-tab' + (tab === 'all'    ? ' active' : '');
  document.getElementById('vtab-pinned').className = 'fn-view-tab' + (tab === 'pinned' ? ' active' : '');
  currentPage = 1;
  applyFilters(false);
}

function togglePin(id, event){
  event.stopPropagation();
  const pids = getPinnedIds();
  if(pids.has(id)) pids.delete(id); else pids.add(id);
  savePinnedIds(pids);
  const p = pids.has(id);
  if(viewTab === 'pinned'){
    // Item may need to leave the list (unpinned while on Pinned tab)
    applyFilters(false);
  } else {
    const btn = document.getElementById('pin-'+id);
    if(btn){
      btn.className = 'fn-pin-btn' + (p ? ' pinned' : '');
      btn.title = p ? 'Unpin' : 'Pin to favourites';
      btn.innerHTML = pinIcon(p);
    }
  }
  syncToCloud();
}

// ── Render ─────────────────────────────────────────────────────────────
function renderItem(n){
  const ti     = TYPE_ICONS[n.type]    || TYPE_ICONS.General;
  const si     = SEV_ICONS[n.severity] || SEV_ICONS.Info;
  const rid    = getReadIds();
  const pids   = getPinnedIds();
  const rkey   = readKey(n);
  const read   = rid.has(rkey);
  const pinned = pids.has(n.id);
  const prefix = (n.subType && n.subType !== n.type && n.subType !== 'General')
    ? `<span style="color:${ti.color}">[${esc(n.subType)}]</span> `
    : (n.type && n.type !== 'General' ? `<span style="color:${ti.color}">[${esc(n.type)}]</span> ` : '');

  return `
    <div class="fn-item" id="item-${n.id}" data-id="${n.id}" data-rkey="${esc(rkey)}" onclick="handleClick(this)">
      <div class="fn-item-icon" style="background:${ti.bg}">${svgIcon(ti.d,22,ti.color)}</div>
      <div class="fn-item-body">
        <div class="fn-item-row1">
          <div class="fn-item-title">${prefix}${esc(n.title)}</div>
          <button class="fn-pin-btn${pinned?' pinned':''}" id="pin-${n.id}" onclick="togglePin('${n.id}',event)" title="${pinned?'Unpin':'Pin to favourites'}">${pinIcon(pinned)}</button>
          <button class="fn-item-expand" id="exp-${n.id}" onclick="toggleExpand(event,'${n.id}')" style="display:none">${chevDown()}</button>
        </div>
        <div class="fn-item-msg clamp" id="msg-${n.id}">${esc(n.message||'')}</div>
        <div class="fn-item-footer">
          <span class="sev-pill ${si.cls}">${svgIcon(si.d,12,si.color)} ${n.severity||'Info'}</span>
          ${n.link?`<a class="fn-link-btn" href="${esc(n.link)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Open link"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg></a>`:''}
          <div class="fn-item-time">
            ${timeAgo(n.createdAt)}
            ${!read ? `<span class="fn-dot" id="dot-${n.id}"></span>` : ''}
          </div>
        </div>
      </div>
    </div>`;
}

function applyChevronVisibility(){
  document.querySelectorAll('.fn-item-msg.clamp').forEach(msg => {
    const btn = msg.closest('.fn-item-body')?.querySelector('.fn-item-expand');
    if(!btn) return;
    // Remove clamp to read true full height, then restore — reading scrollHeight
    // forces a synchronous layout recalculation each time
    msg.classList.remove('clamp');
    const fullH = msg.scrollHeight;
    msg.classList.add('clamp');
    const clampH = msg.offsetHeight; // forces layout after re-applying clamp
    btn.style.display = fullH > clampH + 4 ? '' : 'none';
  });
}

function toggleExpand(e, id){
  e.stopPropagation();
  const btn  = e.target.closest('.fn-item-expand') || document.getElementById('exp-'+id);
  const item = btn && btn.closest('.fn-item');
  const msg  = item && item.querySelector('.fn-item-msg');
  if(!msg||!btn) return;
  if(expanded.has(id)){
    expanded.delete(id);
    msg.classList.add('clamp');
    btn.innerHTML = chevDown();
  } else {
    expanded.add(id);
    msg.classList.remove('clamp');
    btn.innerHTML = chevUp();
    handleClick(item);
  }
}

function handleClick(el){
  const id   = el.dataset.id;
  const rkey = el.dataset.rkey;
  const rid  = getReadIds();
  if(rid.has(rkey)) return;
  rid.add(rkey); saveReadIds(rid);
  const dot = document.getElementById('dot-'+id);
  if(dot) dot.remove();
  syncToCloud();
}

function markAllRead(){
  const rid = getReadIds();
  allNotifs.forEach(n => rid.add(readKey(n)));
  saveReadIds(rid);
  document.querySelectorAll('.fn-dot').forEach(d => d.remove());
  syncToCloud();
}

// ── Type filter dropdown ───────────────────────────────────────────────
let typeFilter = ['Carrier','Country','General'];

function toggleTypeDropdown(){
  const menu = document.getElementById('type-dd-menu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function toggleTypeAll(){
  typeFilter = typeFilter.length === 3 ? [] : ['Carrier','Country','General'];
  updateTypeDDUI(); applyFilters();
}

function toggleTypeOption(opt){
  typeFilter = typeFilter.includes(opt) ? typeFilter.filter(x=>x!==opt) : [...typeFilter, opt];
  updateTypeDDUI(); applyFilters();
}

function updateTypeDDUI(){
  const all = typeFilter.length === 3;
  const none = typeFilter.length === 0;
  const chkAll = document.getElementById('dd-chk-all');
  chkAll.checked = all; chkAll.indeterminate = !all && !none;
  document.getElementById('dd-chk-carrier').checked = typeFilter.includes('Carrier');
  document.getElementById('dd-chk-country').checked = typeFilter.includes('Country');
  document.getElementById('dd-chk-general').checked = typeFilter.includes('General');
  const lbl = document.getElementById('type-dd-label');
  lbl.textContent = all ? 'Type' : none ? 'Type (none)' : `Type (${typeFilter.length})`;
}

// Close type dropdown on outside click
document.addEventListener('click', e => {
  const wrap = document.getElementById('type-dd-wrap');
  if(wrap && !wrap.contains(e.target)){
    const menu = document.getElementById('type-dd-menu');
    if(menu) menu.style.display = 'none';
  }
});

function resetFilters(){
  typeFilter = ['Carrier','Country','General'];
  updateTypeDDUI();
  document.getElementById('sort-select').value = 'newest';
  document.getElementById('date-filter').value = '';
  document.getElementById('search').value      = '';
  showingOlder = false;
  applyFilters();
}

// ── Filter & Sort ──────────────────────────────────────────────────────
function applyFilters(resetPage = true){
  if(resetPage) currentPage = 1;

  const search = (document.getElementById('search')?.value||'').toLowerCase();
  const sort   = document.getElementById('sort-select')?.value || 'newest';
  const date   = document.getElementById('date-filter')?.value || '';

  let filtered = allNotifs.filter(n => {
    if(!typeFilter.includes(n.type)) return false;
    if(search && !n.title.toLowerCase().includes(search) && !(n.message||'').toLowerCase().includes(search)) return false;
    if(date){
      const nd = new Date(n.createdAt);
      const fd = new Date(date+'T00:00:00');
      if(nd.toDateString()!==fd.toDateString()) return false;
    }
    return true;
  });

  const sevOrder = { Critical:0, Warning:1, Info:2 };
  if(sort==='newest') filtered.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  else if(sort==='oldest') filtered.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  else if(sort==='severity') filtered.sort((a,b)=>(sevOrder[a.severity]??3)-(sevOrder[b.severity]??3));

  let visible;
  if(viewTab === 'pinned'){
    const pids = getPinnedIds();
    visible = filtered.filter(n => pids.has(n.id));
    document.getElementById('fn-show-older').style.display = 'none';
  } else {
    const cutoff = new Date(Date.now() - RECENT_DAYS*86400000);
    const recent = filtered.filter(n => new Date(n.createdAt) >= cutoff);
    const older  = filtered.filter(n => new Date(n.createdAt) <  cutoff);

    // Auto-expand older section if any unread notifications are hidden there
    if(!showingOlder && older.length > 0){
      const rid = getReadIds();
      if(older.some(n => !rid.has(readKey(n)))) showingOlder = true;
    }

    visible = showingOlder ? filtered : recent;
    const showOlderBtn = document.getElementById('fn-show-older');
    showOlderBtn.style.display = (!showingOlder && older.length > 0) ? 'flex' : 'none';
  }

  visibleCount = visible.length;
  document.getElementById('fn-count').textContent = visible.length;

  // Paginate
  const totalPages = Math.max(1, Math.ceil(visible.length / rowsPerPage));
  currentPage = Math.min(currentPage, totalPages);
  const start    = (currentPage - 1) * rowsPerPage;
  const pageItems = visible.slice(start, start + rowsPerPage);

  const list = document.getElementById('fn-list');
  list.innerHTML = pageItems.length
    ? pageItems.map(renderItem).join('')
    : `<div class="fn-empty">${viewTab === 'pinned' ? 'No pinned notifications.' : 'No notifications found.'}</div>`;
  if(pageItems.length) setTimeout(applyChevronVisibility, 0);

  renderPagination(visible.length, currentPage, rowsPerPage);
}

function showOlder(){
  showingOlder = true;
  currentPage = 1;
  applyFilters(false);
}

// ── Pagination ─────────────────────────────────────────────────────────
function renderPagination(total, page, perPage){
  const bar = document.getElementById('fn-pagination');
  if(!bar) return;
  if(total === 0){ bar.innerHTML = ''; return; }

  const totalPages = Math.max(1, Math.ceil(total / perPage));
  const start = (page - 1) * perPage + 1;
  const end   = Math.min(page * perPage, total);
  const isFirst = page === 1;
  const isLast  = page === totalPages;

  bar.innerHTML = `
    <div class="fn-pg-left">
      <span class="fn-pg-label">Rows per page:</span>
      <select class="fn-pg-select" onchange="changeRowsPerPage(this.value)">
        ${[5,10,25,50].map(n=>`<option value="${n}"${n===perPage?' selected':''}>${n}</option>`).join('')}
      </select>
    </div>
    <div class="fn-pg-right">
      <span class="fn-pg-info">${start}–${end} of ${total}</span>
      <button class="fn-pg-btn" onclick="goToPage(1)"           ${isFirst?'disabled':''} title="First page">«</button>
      <button class="fn-pg-btn" onclick="goToPage(${page-1})"   ${isFirst?'disabled':''} title="Previous page">‹</button>
      <span class="fn-pg-current">${page}</span>
      <button class="fn-pg-btn" onclick="goToPage(${page+1})"   ${isLast?'disabled':''} title="Next page">›</button>
      <button class="fn-pg-btn" onclick="goToPage(${totalPages})" ${isLast?'disabled':''} title="Last page">»</button>
    </div>`;
}

function goToPage(n){
  const totalPages = Math.max(1, Math.ceil(visibleCount / rowsPerPage));
  currentPage = Math.max(1, Math.min(n, totalPages));
  applyFilters(false);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function changeRowsPerPage(val){
  rowsPerPage = parseInt(val, 10);
  currentPage = 1;
  applyFilters(false);
}

// ── Data Fetch ─────────────────────────────────────────────────────────
async function loadData(){
  try{
    // Fetch config + cloud state in parallel
    const [cfg, cloudState] = await Promise.all([
      fetch('/api/config').then(r=>r.json()),
      getCloudState()
    ]);
    if(!cfg?.supabaseUrl || !cfg?.supabaseKey){ showError(); return; }

    // Merge cloud read IDs into local (union — reads only accumulate)
    if(cloudState.readIds.size > 0){
      const local = getReadIds();
      const merged = new Set([...local, ...cloudState.readIds]);
      saveReadIds(merged);
    }
    // Sync pinned IDs — cloud is authoritative (replacement)
    savePinnedIds(cloudState.pinnedIds);
    // Always push local state back to cloud so dashboard picks up reads done here
    syncToCloud();

    const rows = await fetch(
      `${cfg.supabaseUrl}/rest/v1/${cfg.supabaseTable||'notifications_data'}?id=eq.1&select=data`,
      { headers:{ 'apikey': cfg.supabaseKey, 'Authorization': `Bearer ${cfg.supabaseKey}` } }
    ).then(r=>r.json());
    const all = Array.isArray(rows[0]?.data) ? rows[0].data : [];
    allNotifs = all.filter(n => n.status === 'Active');
    applyFilters();
  } catch(e){
    console.error(e);
    showError();
  }
}

function showError(){
  document.getElementById('fn-list').innerHTML = '<div class="fn-empty">Could not load notifications.</div>';
}

// ── Lightweight fast sync (pin + read state only, no full re-render) ───
async function syncOnlyPoll(){
  try{
    const cloudState = await getCloudState();

    // readIds — union merge, remove newly-read dots from DOM
    const local  = getReadIds();
    const merged = new Set([...local, ...cloudState.readIds]);
    if(merged.size > local.size){
      saveReadIds(merged);
      merged.forEach(rkey => {
        if(!local.has(rkey)){
          const n = allNotifs.find(x => readKey(x) === rkey);
          if(n){ const dot = document.getElementById('dot-'+n.id); if(dot) dot.remove(); }
        }
      });
    }

    // pinnedIds — replacement, update visible pin buttons if changed
    const localPids = getPinnedIds();
    const cloudPids = cloudState.pinnedIds;
    const same = cloudPids.size === localPids.size && [...cloudPids].every(id => localPids.has(id));
    if(!same){
      savePinnedIds(cloudPids);
      if(viewTab === 'pinned'){
        // Re-render so items appear/disappear correctly
        applyFilters(false);
      } else {
        allNotifs.forEach(n => {
          const btn = document.getElementById('pin-'+n.id);
          if(!btn) return;
          const p = cloudPids.has(n.id);
          btn.className = 'fn-pin-btn' + (p ? ' pinned' : '');
          btn.title = p ? 'Unpin' : 'Pin to favourites';
          btn.innerHTML = pinIcon(p);
        });
      }
    }
  } catch{}
}

loadData();
setInterval(loadData, 30000);
setInterval(syncOnlyPoll, 5000);
</script>
